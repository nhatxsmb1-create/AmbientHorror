name: AmbientHorror
version: '1.0.0-V1'
main: dev.ambienthorror.AmbientHorror
api-version: '1.21'
description: Psychological Horror Ambient System
author: YourName
website: ''

softdepend: []

commands:
  ambienthorror:
    description: AmbientHorror main command
    aliases: [ah]
    usage: /ah <reload|status|debug|presence>
    permission: ambienthorror.admin

permissions:
  ambienthorror.admin:
    description: Full access to AmbientHorror commands
    default: op
  ambienthorror.bypass:
    description: Player không bị ảnh hưởng bởi ambient events
    default: false
